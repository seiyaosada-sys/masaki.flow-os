<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>まさき整形 受付対応OS v0.3.6</title>
  <style>
    :root{
      --bg:#0f172a;
      --panel:#111827;
      --panel2:#0b1220;
      --card:#1e293b;
      --cardHover:#334155;
      --border:#243244;
      --text:#f8fafc;
      --muted:#a7b0be;
      --blue:#38bdf8;
      --green:#34d399;
      --amber:#fbbf24;
      --red:#f87171;
      --radius:16px;
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Sans","Noto Sans JP",sans-serif;
      background:var(--bg);
      color:var(--text);
      overflow:hidden;
      -webkit-tap-highlight-color:transparent;
    }

    header{
      height:58px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 20px;
      background:var(--panel);
      border-bottom:1px solid var(--border);
      font-size:20px;
      font-weight:700;
      letter-spacing:.2px;
    }

    .header-right{
      display:flex;
      gap:10px;
      align-items:center;
    }

    .path-chip{
      font-size:12px;
      color:var(--muted);
      border:1px solid var(--border);
      border-radius:999px;
      padding:5px 10px;
      background:#0f172a;
      max-width:340px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .layout{
      display:flex;
      height:calc(100vh - 58px);
      min-height:0;
    }

    .menu{
      width:42%;
      min-width:420px;
      max-width:620px;
      padding:18px;
      background:var(--panel2);
      border-right:1px solid var(--border);
      overflow:auto;
      overscroll-behavior:contain;
      touch-action:pan-y;
    }

    .menu-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      align-content:start;
    }

    .detail{
      width:58%;
      min-width:0;
      padding:24px;
      background:var(--panel);
      overflow:auto;
      overscroll-behavior:contain;
      touch-action:pan-y;
    }

    .tap-btn{
      border:none;
      border-radius:var(--radius);
      background:var(--card);
      color:var(--text);
      padding:18px 16px;
      font-size:18px;
      font-weight:700;
      text-align:left;
      cursor:pointer;
      transition:background .18s ease, transform .04s ease;
      user-select:none;
      touch-action:manipulation;
      box-shadow:0 0 0 1px rgba(255,255,255,.03) inset;
    }

    .tap-btn:active{
      transform:scale(.992);
    }

    .tap-btn:hover{
      background:var(--cardHover);
    }

    .tap-btn.primary{ box-shadow:0 0 0 1px rgba(56,189,248,.32) inset; }
    .tap-btn.warn{ box-shadow:0 0 0 1px rgba(251,191,36,.35) inset; }
    .tap-btn.ok{ box-shadow:0 0 0 1px rgba(52,211,153,.35) inset; }
    .tap-btn.danger{ box-shadow:0 0 0 1px rgba(248,113,113,.35) inset; }

    .section-label{
      font-size:13px;
      color:var(--muted);
      margin-bottom:12px;
      font-weight:700;
      letter-spacing:.3px;
    }

    .title-row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
      margin-bottom:16px;
    }

    .title-wrap{
      min-width:0;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      padding:5px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      font-size:12px;
      font-weight:800;
      color:var(--muted);
      margin-bottom:10px;
      background:#0f172a;
    }
    .badge.blue{ color:#bfdbfe; border-color:rgba(56,189,248,.35); }
    .badge.green{ color:#a7f3d0; border-color:rgba(52,211,153,.35); }
    .badge.amber{ color:#fde68a; border-color:rgba(251,191,36,.35); }
    .badge.red{ color:#fecaca; border-color:rgba(248,113,113,.35); }

    .detail h2{
      margin:0;
      font-size:26px;
      color:var(--blue);
      line-height:1.25;
      letter-spacing:.2px;
    }

    .script{
      background:#0f172a;
      border:1px solid var(--border);
      border-radius:18px;
      padding:18px;
      font-size:22px;
      line-height:1.65;
      font-weight:700;
      white-space:pre-line;
      margin-bottom:18px;
    }

    .hint{
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
      margin:-4px 0 18px;
      white-space:pre-line;
    }

    .sub-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-bottom:18px;
    }

    .control-row{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .small-btn{
      padding:12px 14px;
      font-size:15px;
      min-width:120px;
    }

    .checks{
      display:grid;
      gap:10px;
      margin-bottom:18px;
    }

    .check-item{
      display:flex;
      gap:10px;
      align-items:flex-start;
      background:#0f172a;
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px 14px;
      font-size:16px;
      line-height:1.5;
      font-weight:600;
    }

    .check-item input{
      width:20px;
      height:20px;
      margin-top:2px;
      flex:0 0 auto;
    }

    .detail-box{
      background:#0f172a;
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px 16px;
      font-size:15px;
      line-height:1.7;
      white-space:pre-line;
      margin-bottom:18px;
    }

    .home-note{
      font-size:15px;
      color:var(--muted);
      line-height:1.7;
      white-space:pre-line;
    }

    @media (max-width: 1100px){
      .menu{ min-width:360px; width:44%; }
      .detail{ width:56%; }
      .script{ font-size:20px; }
      .detail h2{ font-size:24px; }
    }
  </style>
</head>

    const CHECK_STORE_KEY = "masaki_os_v036_checks";
    let currentScreen = "home";
    let checks = {};

    function loadChecks(){
      try{
        const raw = localStorage.getItem(CHECK_STORE_KEY);
        if(raw){ checks = JSON.parse(raw) || {}; }
      }catch(e){
        checks = {};
      }
    }

    function saveChecks(){
      localStorage.setItem(CHECK_STORE_KEY, JSON.stringify(checks));
    }

    function getCheckKey(screenId, idx){
      return screenId + "__" + idx;
    }

    function renderMenu(){
      const grid = document.getElementById("menuGrid");
      grid.innerHTML = "";
      MENU.forEach(function(item){
        const btn = document.createElement("button");
        btn.className = "tap-btn " + (item.style || "");
        btn.textContent = item.label;
        btn.setAttribute("data-target", item.id);
        grid.appendChild(btn);
      });
    }

    function renderScreen(screenId){
      currentScreen = screenId;
      const s = SCREENS[screenId];
      const detail = document.getElementById("detailArea");
      const pathChip = document.getElementById("pathChip");
      pathChip.textContent = screenId.toUpperCase();

      let html = "";

      html += '<div class="title-row">';
      html +=   '<div class="title-wrap">';
      html +=     '<div class="badge ' + (s.badgeClass || "blue") + '">' + escapeHtml(s.badge || "") + '</div>';
      html +=     '<h2>' + escapeHtml(s.title || "") + '</h2>';
      html +=   '</div>';
      html +=   '<div class="control-row">';
      if(s.backTo){
        html += '<button class="tap-btn small-btn" data-target="' + s.backTo + '">戻る</button>';
      }
      html +=   '<button class="tap-btn small-btn" data-target="home">ホーム</button>';
      html +=   '</div>';
      html += '</div>';

      html += '<div class="script">' + escapeHtml(s.script || "") + '</div>';
      if(s.hint){
        html += '<div class="hint">' + escapeHtml(s.hint) + '</div>';
      }

      if(s.buttons && s.buttons.length){
        html += '<div class="sub-grid">';
        s.buttons.forEach(function(b){
          html += '<button class="tap-btn ' + (b.style || "") + '" data-target="' + b.id + '">' + escapeHtml(b.label) + '</button>';
        });
        html += '</div>';
      }

      if(s.checks && s.checks.length){
        html += '<div class="section-label">内部チェック</div>';
        html += '<div class="checks">';
        s.checks.forEach(function(text, idx){
          const key = getCheckKey(screenId, idx);
          const checked = checks[key] ? "checked" : "";
          html += '<label class="check-item">';
          html +=   '<input type="checkbox" data-check-key="' + key + '" ' + checked + '>';
          html +=   '<span>' + escapeHtml(text) + '</span>';
          html += '</label>';
        });
        html += '</div>';
      }

      if(s.detail){
        html += '<div class="section-label">詳細</div>';
        html += '<div class="detail-box">' + escapeHtml(s.detail) + '</div>';
      }

      if(screenId === "home"){
        html += '<div class="home-note">左メニュー固定 / 右詳細表示のタブレット運用版です。\nスクロール中の誤タップを減らすため、指を動かした場合はタップ判定しない設定にしています。</div>';
      }

      detail.innerHTML = html;
      bindCheckEvents();
    }

    function bindCheckEvents(){
      document.querySelectorAll('[data-check-key]').forEach(function(el){
        el.addEventListener('change', function(){
          const key = el.getAttribute('data-check-key');
          checks[key] = el.checked ? 1 : 0;
          saveChecks();
        });
      });
    }

    function escapeHtml(str){
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    /* ===== 誤タップ防止（Android向け） ===== */
    let tapState = null;
    const MOVE_LIMIT = 14;
    const TIME_LIMIT = 500;

    document.addEventListener("pointerdown", function(e){
      const btn = e.target.closest(".tap-btn");
      if(!btn) return;
      tapState = {
        btn: btn,
        x: e.clientX,
        y: e.clientY,
        time: Date.now(),
        moved: false,
        pointerId: e.pointerId
      };
    }, true);

    document.addEventListener("pointermove", function(e){
      if(!tapState) return;
      if(e.pointerId !== tapState.pointerId) return;
      const dx = Math.abs(e.clientX - tapState.x);
      const dy = Math.abs(e.clientY - tapState.y);
      if(dx > MOVE_LIMIT || dy > MOVE_LIMIT){
        tapState.moved = true;
      }
    }, true);

    document.addEventListener("pointercancel", function(){
      tapState = null;
    }, true);

    document.addEventListener("pointerup", function(e){
      if(!tapState) return;
      if(e.pointerId !== tapState.pointerId) return;

      const btn = e.target.closest(".tap-btn");
      const sameBtn = btn && btn === tapState.btn;
      const elapsed = Date.now() - tapState.time;

      if(sameBtn && !tapState.moved && elapsed <= TIME_LIMIT){
        const target = tapState.btn.getAttribute("data-target");
        if(target && SCREENS[target]){
          renderScreen(target);
        }
      }
      tapState = null;
    }, true);

    /* click無効化（誤反応防止） */
    document.addEventListener("click", function(e){
      if(e.target.closest(".tap-btn")){
        e.preventDefault();
        e.stopPropagation();
      }
    }, true);

    loadChecks();
    renderMenu();
    renderScreen("home");
  </script>
