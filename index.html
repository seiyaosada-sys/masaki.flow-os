<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>まさき整形 受付対応OS v0.3.6</title>

<style>
:root{
--bg:#0f172a;
--panel:#111827;
--card:#1e293b;
--border:#243244;
--text:#f8fafc;
--muted:#a7b0be;
--blue:#38bdf8;
--green:#34d399;
--amber:#fbbf24;
--red:#f87171;
--radius:16px;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Noto Sans JP";
background:var(--bg);
color:var(--text);
overflow:hidden;
}

header{
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
background:var(--panel);
border-bottom:1px solid var(--border);
font-weight:700;
}

.path{
font-size:12px;
color:var(--muted);
}

.layout{
display:flex;
height:calc(100vh - 60px);
}

.menu{
width:40%;
padding:16px;
overflow:auto;
border-right:1px solid var(--border);
}

.menu button{
width:100%;
margin-bottom:10px;
padding:16px;
border:none;
border-radius:var(--radius);
background:var(--card);
color:white;
font-weight:700;
font-size:16px;
}

.menu button.danger{outline:2px solid var(--red);}
.menu button.ok{outline:2px solid var(--green);}
.menu button.warn{outline:2px solid var(--amber);}

.detail{
flex:1;
padding:20px;
overflow:auto;
}

.script{
background:#020617;
padding:20px;
border-radius:16px;
font-size:20px;
margin-bottom:15px;
white-space:pre-line;
}

.check{
background:#020617;
padding:12px;
margin-bottom:8px;
border-radius:10px;
}

</style>
</head>

<body>

<header>
<div>受付OS v0.3.6</div>
<div class="path" id="path">HOME</div>
</header>

<div class="layout">

<div class="menu" id="menu"></div>

<div class="detail" id="detail"></div>

</div>

<script>

const MENU = [
{ id:"home", label:"ホーム"},
{ id:"return", label:"再診"},
{ id:"money", label:"金額説明", style:"warn"},
{ id:"docs", label:"書類", style:"danger"}
];

const SCREENS = {

home:{
title:"選択してください",
script:"左から選択",
path:"HOME"
},

return:{
title:"再診",
script:"本日はどの内容ですか？",
path:"再診",
buttons:[
{id:"drug",label:"薬（診察必須）",style:"danger"},
{id:"xp",label:"XP（診察必須）",style:"danger"},
{id:"physio",label:"物療のみ",style:"ok"}
]
},

drug:{
title:"薬処方",
script:"薬の処方は診察が必要です\n※処方権限は医師のみ",
path:"再診 > 薬"
},

xp:{
title:"XP",
script:"レントゲンは診察が必要です\n※撮影指示は医師のみ",
path:"再診 > XP"
},

physio:{
title:"物療",
script:"物療は指示があればそのまま案内可能",
path:"再診 > 物療"
},

money:{
title:"金額説明",
script:"診療は点数制です\n内容により変わります",
path:"金額説明",
detail:`
例：
診察のみ → 数千円
レントゲン → 5000〜10000円
処置あり → 変動
`
},

docs:{
title:"書類",
script:"2〜3週間かかります",
path:"書類"
}

};

let current="home";

function renderMenu(){
const el=document.getElementById("menu");
el.innerHTML="";
MENU.forEach(m=>{
const b=document.createElement("button");
b.innerText=m.label;
if(m.style) b.classList.add(m.style);
b.onclick=()=>render(m.id);
el.appendChild(b);
});
}

function render(id){

// チェックリセット（今回の改善）
document.querySelectorAll("input[type=checkbox]").forEach(e=>e.checked=false);

current=id;
const s=SCREENS[id];
document.getElementById("path").innerText=s.path;

let html=`<h2>${s.title}</h2>`;
html+=`<div class="script">${s.script}</div>`;

if(s.detail){
html+=`<div>${s.detail}</div>`;
}

if(s.buttons){
s.buttons.forEach(b=>{
html+=`<button onclick="render('${b.id}')" class="${b.style||""}">${b.label}</button>`;
});
}

html+=`<br><br><button onclick="render('home')">ホーム</button>`;

document.getElementById("detail").innerHTML=html;
}

renderMenu();
render("home");

</script>

</body>
</html>
