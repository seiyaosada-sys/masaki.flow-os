<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>まさき整形 受付ガイドブック v1.0.0</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel2: #0b1220;
      --card: #1e293b;
      --cardHover: #334155;
      --border: #243244;
      --text: #f8fafc;
      --muted: #94a3b8;
      --blue: #38bdf8;
      --green: #34d399;
      --amber: #fbbf24;
      --red: #f87171;
      --radius: 12px;
      --header-h: 64px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* Header */
    header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }
    .brand { font-size: 18px; font-weight: 800; letter-spacing: 0.5px; color: var(--blue); }
    .path-chip {
      font-size: 12px;
      color: var(--muted);
      background: var(--bg);
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    /* Layout */
    .layout {
      display: flex;
      height: calc(100vh - var(--header-h));
    }

    /* Sidebar */
    .sidebar {
      width: 380px;
      background: var(--panel2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .search-box {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .search-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    .search-input:focus { border-color: var(--blue); }

    .menu-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      overscroll-behavior: contain;
    }
    .menu-category {
      margin-bottom: 24px;
    }
    .category-label {
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      padding-left: 4px;
    }
    .menu-list {
      display: grid;
      gap: 8px;
    }

    /* Buttons */
    .tap-btn {
      border: none;
      border-radius: var(--radius);
      background: var(--card);
      color: var(--text);
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 600;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .tap-btn:active { transform: scale(0.98); }
    .tap-btn.active { background: var(--blue); color: #000; }
    .tap-btn.warn { border-left: 4px solid var(--amber); }
    .tap-btn.danger { border-left: 4px solid var(--red); }
    .tap-btn.ok { border-left: 4px solid var(--green); }

    /* Main Content */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
      background: var(--panel);
      overscroll-behavior: contain;
    }
    .content-inner { max-width: 800px; margin: 0 auto; }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .badge.blue { background: rgba(56, 189, 248, 0.15); color: var(--blue); }
    .badge.amber { background: rgba(251, 191, 36, 0.15); color: var(--amber); }
    .badge.red { background: rgba(248, 113, 113, 0.15); color: var(--red); }

    h2 { font-size: 32px; margin: 0 0 24px 0; font-weight: 800; }

    .script-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      font-size: 20px;
      line-height: 1.6;
      font-weight: 600;
      margin-bottom: 24px;
      position: relative;
    }
    .script-box::before {
      content: "案内セリフ";
      position: absolute;
      top: -10px;
      left: 20px;
      background: var(--blue);
      color: #000;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 800;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .card-section {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .section-title {
      font-size: 14px;
      font-weight: 800;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .check-list { display: grid; gap: 10px; }
    .check-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 12px;
      background: var(--bg);
      border-radius: 10px;
      border: 1px solid var(--border);
      cursor: pointer;
    }
    .check-item input { width: 20px; height: 20px; margin-top: 2px; }

    .faq-item {
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }
    .faq-q { font-weight: 800; color: var(--blue); margin-bottom: 4px; display: flex; gap: 8px; }
    .faq-a { font-size: 14px; color: var(--text); line-height: 1.6; padding-left: 24px; }

    .btn-group { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
    .sub-btn {
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 700;
      border-radius: 10px;
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      cursor: pointer;
    }
    .sub-btn:hover { background: var(--cardHover); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    @media (max-width: 1024px) {
      .sidebar { width: 320px; }
      h2 { font-size: 24px; }
      .script-box { font-size: 18px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">MASAKI ORTHO GUIDE</div>
    <div class="header-right">
      <div class="path-chip" id="pathDisplay">HOME</div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="search-box">
        <input type="text" class="search-input" id="searchInput" placeholder="キーワードで検索（例：労災、MRI）">
      </div>
      <div class="menu-scroll" id="menuContainer">
        <!-- Menu categories will be injected here -->
      </div>
    </aside>

    <main class="main-content" id="mainContent">
      <!-- Content will be injected here -->
    </main>
  </div>

  <script>
    const DATA = {
      categories: [
        { id: "basic", label: "基本対応", items: ["home", "first", "return", "wait"] },
        { id: "exam", label: "検査・処置", items: ["results", "mri", "xp", "crutch", "sand"] },
        { id: "docs", label: "書類・公費", items: ["docs", "rousai", "accident", "seiho"] },
        { id: "money", label: "会計・自費", items: ["money", "jihi"] }
      ],
      screens: {
        home: {
          title: "受付ガイドブックへようこそ",
          badge: "HOME",
          badgeClass: "blue",
          script: "こちらは「まさき整形外科」の受付対応ガイドです。\n左のメニューから項目を選択するか、検索窓を活用してください。",
          detail: "【更新情報 v1.0.0】\n・検索機能を追加しました。\n・FAQセクションを新設しました。\n・UIをガイドブック形式に刷新しました。",
          faq: [
            { q: "このツールの使い方は？", a: "左側のメニューから現在の状況に合うボタンを押してください。案内すべきセリフと、確認すべきチェックリストが表示されます。" },
            { q: "検索はどう使う？", a: "上の検索窓に「保険証」や「返金」などのキーワードを入れると、関連する項目が絞り込まれます。" }
          ]
        },
        first: {
          title: "初診の受付",
          badge: "基本",
          badgeClass: "blue",
          script: "初診の方ですね。問診票のご記入と、マイナンバーカードまたは保険証の確認をお願いします。",
          checks: ["問診票の案内・回収", "マイナ/保険証の資格確認", "他院からの紹介状の有無を確認", "2ヶ月以上のブランクがあるか確認"],
          faq: [
            { q: "紹介状がない場合は？", a: "当院では紹介状がなくても受診可能です。ただし、お持ちであればスムーズに診察が進む旨をお伝えください。" },
            { q: "予約は必要？", a: "当院は予約制ではありませんが、リハビリなどは予約枠があることを説明してください。" }
          ]
        },
        return: {
          title: "再診の受付",
          badge: "基本",
          badgeClass: "blue",
          script: "本日はどのようなご用件でしょうか？",
          buttons: [
            { id: "nr_exam", label: "診察・経過観察" },
            { id: "nr_drug", label: "お薬の処方のみ" },
            { id: "nr_dr_inj", label: "注射の希望" }
          ]
        },
        rousai: {
          title: "労災（仕事中・通勤中）",
          badge: "重要",
          badgeClass: "red",
          script: "お仕事中や通勤中の怪我ですね。労災扱いとなるため、健康保険は使用できません。",
          detail: "【重要事項】\n・会社から「5号」または「16号の3」の書類をもらう必要があります。\n・書類が揃うまでは、一旦10割（全額）でお預かりとなります。",
          checks: ["仕事中か通勤中かを確認", "健康保険不可の説明", "10割預かりの説明", "会社への報告有無を確認"],
          faq: [
            { q: "いつ返金される？", a: "会社から書類が届き、当院で処理が完了した後に窓口で精算・返金いたします。" }
          ]
        },
        accident: {
          title: "交通事故・第三者行為",
          badge: "重要",
          badgeClass: "red",
          script: "交通事故での受診ですね。相手方の保険会社から連絡は入っていますでしょうか？",
          detail: "【返金ルール】\n・保険会社から「一括対応」の連絡があれば窓口負担は0円です。\n・連絡がない場合は10割預かりとなります。",
          checks: ["保険会社名と担当者名の確認", "一括対応の有無を確認", "警察用診断書の必要性を確認"],
          faq: [
            { q: "自分の保険を使いたいと言われたら？", a: "第三者行為による傷病届が必要になる旨を説明し、基本は自賠責優先であることを伝えてください。" }
          ]
        },
        mri: {
          title: "MRI予約の手順",
          badge: "検査",
          badgeClass: "amber",
          script: "MRIの予約ですね。外部提携先での検査となりますので、予約枠を確認します。",
          detail: "1. 希望日時をヒアリング\n2. 専用iPadで予約入力\n3. 案内票を印刷して患者へ渡す",
          checks: ["体内に金属がないか確認", "閉所恐怖症の有無を確認", "予約票の渡し忘れがないか確認"]
        }
      }
    };

    const state = {
      current: "home",
      search: "",
      checks: JSON.parse(localStorage.getItem("masaki_checks") || "{}")
    };

    function renderMenu() {
      const container = document.getElementById("menuContainer");
      container.innerHTML = "";

      DATA.categories.forEach(cat => {
        const filteredItems = cat.items.filter(id => {
          const screen = DATA.screens[id];
          if (!screen) return false;
          return screen.title.includes(state.search) || id.includes(state.search);
        });

        if (filteredItems.length === 0) return;

        const catDiv = document.createElement("div");
        catDiv.className = "menu-category";
        catDiv.innerHTML = `<div class="category-label">${cat.label}</div>`;
        
        const list = document.createElement("div");
        list.className = "menu-list";
        
        filteredItems.forEach(id => {
          const screen = DATA.screens[id];
          const btn = document.createElement("button");
          btn.className = `tap-btn ${id === state.current ? 'active' : ''}`;
          if (screen.badgeClass === 'red') btn.classList.add('danger');
          if (screen.badgeClass === 'amber') btn.classList.add('warn');
          
          btn.innerHTML = `<span>${screen.title}</span>`;
          btn.onclick = () => navigate(id);
          list.appendChild(btn);
        });

        catDiv.appendChild(list);
        container.appendChild(catDiv);
      });
    }

    function navigate(id) {
      state.current = id;
      renderMenu();
      renderContent();
      document.getElementById("pathDisplay").textContent = id.toUpperCase();
      document.getElementById("mainContent").scrollTop = 0;
    }

    function renderContent() {
      const screen = DATA.screens[state.current];
      const container = document.getElementById("mainContent");
      
      if (!screen) {
        container.innerHTML = "Content not found.";
        return;
      }

      let html = `<div class="content-inner">`;
      html += `<div class="badge ${screen.badgeClass || 'blue'}">${screen.badge}</div>`;
      html += `<h2>${screen.title}</h2>`;
      
      if (screen.script) {
        html += `<div class="script-box">${screen.script.replace(/\n/g, '<br>')}</div>`;
      }

      if (screen.buttons) {
        html += `<div class="section-title">関連メニュー</div>`;
        html += `<div class="btn-group">`;
        screen.buttons.forEach(b => {
          html += `<button class="sub-btn" onclick="navigate('${b.id}')">${b.label}</button>`;
        });
        html += `</div><div style="margin-bottom:32px"></div>`;
      }

      if (screen.checks) {
        html += `<div class="card-section">`;
        html += `<div class="section-title">確認事項（チェックリスト）</div>`;
        html += `<div class="check-list">`;
        screen.checks.forEach((c, i) => {
          const key = `${state.current}_${i}`;
          const checked = state.checks[key] ? "checked" : "";
          html += `
            <label class="check-item">
              <input type="checkbox" ${checked} onchange="toggleCheck('${key}', this.checked)">
              <span>${c}</span>
            </label>
          `;
        });
        html += `</div></div>`;
      }

      if (screen.detail) {
        html += `<div class="card-section">`;
        html += `<div class="section-title">詳細・手順</div>`;
        html += `<div style="white-space:pre-line; font-size:15px; line-height:1.7">${screen.detail}</div>`;
        html += `</div>`;
      }

      if (screen.faq) {
        html += `<div class="card-section">`;
        html += `<div class="section-title">よくある質問 (FAQ)</div>`;
        screen.faq.forEach(f => {
          html += `
            <div class="faq-item">
              <div class="faq-q"><span>Q.</span> ${f.q}</div>
              <div class="faq-a"><span>A.</span> ${f.a}</div>
            </div>
          `;
        });
        html += `</div>`;
      }

      html += `</div>`;
      container.innerHTML = html;
    }

    function toggleCheck(key, val) {
      state.checks[key] = val;
      localStorage.setItem("masaki_checks", JSON.stringify(state.checks));
    }

    // Search logic
    document.getElementById("searchInput").oninput = (e) => {
      state.search = e.target.value;
      renderMenu();
    };

    // Tablet scroll protection
    let tapState = null;
    document.addEventListener("pointerdown", e => {
      const btn = e.target.closest(".tap-btn, .sub-btn, .check-item");
      if (btn) tapState = { x: e.clientX, y: e.clientY, time: Date.now() };
    });
    document.addEventListener("pointerup", e => {
      if (!tapState) return;
      const dist = Math.hypot(e.clientX - tapState.x, e.clientY - tapState.y);
      const time = Date.now() - tapState.time;
      if (dist > 10 || time > 500) {
        // Ignore
      }
      tapState = null;
    });

    // Initial render
    renderMenu();
    renderContent();
  </script>
</body>
</html>
