<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>受付OS v0.3.7</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#0f172a;
color:white;
}

header{
padding:15px;
background:#111827;
display:flex;
justify-content:space-between;
}

.menu{
width:35%;
float:left;
height:calc(100vh - 50px);
overflow:auto;
border-right:1px solid #333;
padding:10px;
}

.detail{
width:65%;
float:left;
padding:20px;
}

button{
width:100%;
margin-bottom:10px;
padding:15px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
font-size:16px;
}

.danger{outline:2px solid #f87171;}
.ok{outline:2px solid #34d399;}
.warn{outline:2px solid #fbbf24;}

.script{
background:#020617;
padding:20px;
margin-bottom:15px;
border-radius:12px;
white-space:pre-line;
font-size:18px;
}

.check{
background:#020617;
padding:10px;
margin-bottom:6px;
border-radius:8px;
}
</style>
</head>

<body>

<header>
<div>受付OS v0.3.7</div>
<div id="path">HOME</div>
</header>

<div class="menu" id="menu"></div>
<div class="detail" id="detail"></div>

<script>

const MENU=[
{ id:"home", label:"ホーム"},
{ id:"crutch", label:"松葉杖"}
];

const SCREENS={

home:{
title:"選択",
script:"左から選択",
path:"HOME"
},

crutch:{
title:"松葉杖",
script:"どちらですか？",
path:"松葉杖",
buttons:[
{id:"crutch_lend",label:"貸出"},
{id:"crutch_return",label:"返却"}
]
},

/* ===== 貸出 ===== */

crutch_lend:{
title:"松葉杖 貸出",
path:"松葉杖 > 貸出",
script:"診察後に貸出を行います",
checks:[
"診察へ案内（医師判断）",
"リハビリ室から貸出確認・借用書受取",
"借用書記入（本紙＋控え）",
"預かり金5,000円説明・受領",
"白金庫へ保管（ID＋杖番号記入）",
"控えを患者へ渡す",
"カルテ記録（貸出日・本数・杖番号）"
]
},

/* ===== 返却 ===== */

crutch_return:{
title:"松葉杖 返却",
path:"松葉杖 > 返却",
script:"返却処理を行います",
checks:[
"診察有無確認（原則：診察後返却）",
"借用書控え確認（無ければ本書にサイン・日付印／使用日数記入）",
"杖番号確認（現物一致）",
"使用日数確認",
"使用料計算（カルテ＋Excel／自費精算）",
"預かり金返金処理",
"書類スキャン",
"カルテ記録（返却日・杖番号・精算済）"
]
}

};

function renderMenu(){
let m=document.getElementById("menu");
m.innerHTML="";
MENU.forEach(i=>{
let b=document.createElement("button");
b.innerText=i.label;
b.onclick=()=>render(i.id);
m.appendChild(b);
});
}

function render(id){
let s=SCREENS[id];
document.getElementById("path").innerText=s.path;

let html=`<h2>${s.title}</h2>`;
html+=`<div class="script">${s.script}</div>`;

if(s.buttons){
s.buttons.forEach(b=>{
html+=`<button onclick="render('${b.id}')">${b.label}</button>`;
});
}

if(s.checks){
s.checks.forEach(c=>{
html+=`<div class="check">□ ${c}</div>`;
});
}

html+=`<br><button onclick="render('home')">ホーム</button>`;

document.getElementById("detail").innerHTML=html;
}

renderMenu();
render("home");

</script>

</body>
</html>
