<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>まさき整形 受付対応OS（v0.3.4）</title>
  <style>
    :root{
      --bg:#0b0c10;
      --card:#11131a;
      --text:#f3f4f6;
      --muted:#a7b0be;
      --border:#1f2937;

      --blue:#60a5fa;
      --red:#f87171;
      --green:#34d399;
      --amber:#fbbf24;

      --dockH:86px;

      /* 見やすさ調整 */
      --fw-title:800;
      --fw-btn:800;
      --fw-script:800;
      --fw-sub:700;
    }

    *{ box-sizing:border-box; -webkit-touch-callout:none; }
    html,body{ height:100%; }

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP","Segoe UI",Roboto,sans-serif;
      background:linear-gradient(180deg,#070812,#0b0c10 35%);
      color:var(--text);
      -webkit-tap-highlight-color:transparent;
      overscroll-behavior:none;
      touch-action:manipulation;
      padding-bottom: calc(var(--dockH) + env(safe-area-inset-bottom));
    }

    header{
      position:sticky; top:0; z-index:10;
      backdrop-filter:blur(10px);
      background:rgba(11,12,16,.72);
      border-bottom:1px solid var(--border);
      padding:12px 14px env(safe-area-inset-top);
    }
    .row{ display:flex; gap:10px; align-items:center; }
    .title{ font-size:16px; font-weight:var(--fw-title); letter-spacing:.2px; }
    .chip{
      font-size:12px; color:var(--muted);
      border:1px solid var(--border);
      padding:4px 8px; border-radius:999px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      max-width:70vw;
    }

    main{ padding:14px 14px 24px; max-width:1100px; margin:0 auto; }

    .layout{
      display:grid;
      gap:12px;
      grid-template-columns: 1fr;
      align-items:start;
    }
    @media(min-width:900px){
      .layout{ grid-template-columns: 1fr 340px; }
      .asideSticky{ position:sticky; top:74px; }
    }

    .card{
      background:rgba(17,19,26,.92);
      border:1px solid var(--border);
      border-radius:18px;
      padding:14px;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
    }

    .sectionTitle{
      font-size:13px;
      font-weight:var(--fw-sub);
      color:var(--muted);
      margin:2px 0 8px;
      letter-spacing:.2px;
    }

    .script{
      font-size:26px;
      line-height:1.32;
      font-weight:var(--fw-script);
      letter-spacing:.15px;
      padding:14px 14px;
      border-radius:16px;
      border:1px solid rgba(96,165,250,.28);
      background:rgba(96,165,250,.10);
      user-select:none;
      white-space:pre-wrap;
    }

    .hint{
      color:var(--muted);
      font-size:13px;
      line-height:1.65;
      white-space:pre-wrap;
    }

    .sep{ height:1px; background:var(--border); margin:10px 0; }

    .btnGrid{ display:grid; grid-template-columns:1fr; gap:10px; }
    @media(min-width:720px){ .btnGrid{ grid-template-columns:1fr 1fr; } }

    button{
      width:100%;
      border:1px solid var(--border);
      background:rgba(255,255,255,.02);
      color:var(--text);
      border-radius:16px;
      padding:14px 14px;
      font-size:18px;
      font-weight:var(--fw-btn);
      text-align:left;
      cursor:pointer;
      user-select:none;
      transition:transform .04s ease, border-color .12s ease, background .12s ease;
      touch-action:manipulation;
    }
    button:active{ transform:scale(.99); }
    button.primary{ border-color:rgba(96,165,250,.48); background:rgba(96,165,250,.12); }
    button.danger{ border-color:rgba(248,113,113,.60); background:rgba(248,113,113,.10); }
    button.ok{ border-color:rgba(52,211,153,.60); background:rgba(52,211,153,.10); }
    button.warn{ border-color:rgba(251,191,36,.60); background:rgba(251,191,36,.08); }
    button.small{
      font-size:14px;
      font-weight:var(--fw-btn);
      padding:10px 12px;
      border-radius:14px;
      text-align:center;
    }

    .footerRow{ display:flex; gap:10px; flex-wrap:wrap; }
    .grow{ flex:1; min-width:140px; }

    .actions{ display:grid; gap:8px; }
    label.check{
      display:flex; gap:10px; align-items:flex-start;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.02);
      font-size:15px;
      font-weight:700;
      line-height:1.45;
    }
    input[type="checkbox"]{ width:20px; height:20px; margin-top:1px; }

    .badge{
      display:inline-block;
      font-size:12px;
      font-weight:800;
      padding:4px 8px;
      border-radius:999px;
      border:1px solid var(--border);
      color:var(--muted);
      letter-spacing:.2px;
    }
    .badge.red{ color:#fecaca; border-color:rgba(248,113,113,.5); background:rgba(248,113,113,.10); }
    .badge.blue{ color:#bfdbfe; border-color:rgba(96,165,250,.5); background:rgba(96,165,250,.10); }
    .badge.green{ color:#a7f3d0; border-color:rgba(52,211,153,.5); background:rgba(52,211,153,.10); }
    .badge.amber{ color:#fde68a; border-color:rgba(251,191,36,.5); background:rgba(251,191,36,.10); }

    /* ===== Modal ===== */
    .modalBack{
      position:fixed; inset:0;
      background:rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      z-index:50;
      touch-action:none;
    }
    .modal{
      width:min(980px, 100%);
      border-radius:18px;
      border:1px solid var(--border);
      background:rgba(17,19,26,.98);
      padding:14px;
      box-shadow:0 20px 60px rgba(0,0,0,.55);
      max-height: calc(100dvh - 32px);
      overflow:auto;
      transform: translateY(-4vh);
    }
    .modalTitle{ font-size:16px; font-weight:800; margin-bottom:8px; }
    .modalText{ color:var(--text); font-size:14px; line-height:1.7; white-space:pre-wrap; }

    /* ===== Dock ===== */
    .dock{
      position:fixed; left:0; right:0; bottom:0;
      height:calc(var(--dockH) + env(safe-area-inset-bottom));
      padding:10px 10px calc(10px + env(safe-area-inset-bottom));
      background:rgba(11,12,16,.86);
      backdrop-filter:blur(12px);
      border-top:1px solid var(--border);
      z-index:40;
    }
    .dockInner{
      max-width:1100px; margin:0 auto;
      display:grid; grid-template-columns:repeat(5, 1fr);
      gap:10px;
    }
    .dockBtn{
      border-radius:18px;
      padding:10px 8px;
      text-align:center;
      font-size:13px;
      font-weight:800;
      line-height:1.1;
      border:1px solid var(--border);
      background:rgba(255,255,255,.02);
      user-select:none;
    }
    .dockBtn .icon{ display:block; font-size:18px; margin-bottom:6px; }
    .dockBtn.active{ border-color:rgba(96,165,250,.48); background:rgba(96,165,250,.10); }
    .dockBtn.docs{ border-color:rgba(248,113,113,.35); }
    .dockBtn.money{ border-color:rgba(251,191,36,.35); }
    .dockBtn.crutch{ border-color:rgba(96,165,250,.25); }
    .dockBtn.seiho{ border-color:rgba(52,211,153,.25); }

    details.accordion{
      border:1px solid var(--border);
      background:rgba(255,255,255,.02);
      border-radius:16px;
      padding:10px 12px;
    }
    details.accordion summary{
      cursor:pointer;
      font-weight:800;
      user-select:none;
      list-style:none;
      outline:none;
    }
    details.accordion summary::-webkit-details-marker{ display:none; }
    .detailBtns{ display:grid; gap:8px; margin-top:10px; }
    .mini{
      font-size:12px;
      line-height:1.6;
      color:var(--muted);
      border:1px solid var(--border);
      background:rgba(255,255,255,.01);
      padding:10px 12px;
      border-radius:14px;
      white-space:pre-wrap;
    }
  </style>
</head>

<body>
<header>
  <div class="row">
    <div class="title">まさき整形 受付対応OS（v0.3.4）</div>
    <span class="chip" id="pathChip">HOME</span>
  </div>
</header>

<main>
  <div class="layout">
    <div class="card" id="screen"></div>
    <aside class="card asideSticky" id="aside"></aside>
  </div>
</main>

<nav class="dock" aria-label="常駐メニュー">
  <div class="dockInner">
    <div class="dockBtn" id="dockHome" onclick="jump('home')" ontouchstart="jump('home')"><span class="icon">🏠</span>ホーム</div>
    <div class="dockBtn docs" id="dockDocs" onclick="jump('docs_entry')" ontouchstart="jump('docs_entry')"><span class="icon">🧾</span>書類</div>
    <div class="dockBtn money" id="dockMoney" onclick="jump('money_hub')" ontouchstart="jump('money_hub')"><span class="icon">💰</span>金額</div>
    <div class="dockBtn crutch" id="dockCrutch" onclick="jump('crutch_entry')" ontouchstart="jump('crutch_entry')"><span class="icon">🩼</span>松葉</div>
    <div class="dockBtn seiho" id="dockSeiho" onclick="jump('seiho_entry')" ontouchstart="jump('seiho_entry')"><span class="icon">🟢</span>生保</div>
  </div>
</nav>

<div class="modalBack" id="modalBack">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="row" style="justify-content: space-between;">
      <div class="modalTitle" id="modalTitle">詳細</div>
      <button class="small" id="closeModal">閉じる</button>
    </div>
    <div class="modalText" id="modalText"></div>
  </div>
</div>

<script>
/* ===== Common texts ===== */
const COMMON = {
  money_common: `診療は「点数制」で計算しているため、内容によって金額が変わります。\n診察・処置後に確定します。`,
  tenwari_common: `診療は点数制のため内容により変わります。\n目安として、診察のみであれば「数千円〜1万円前後」が多いですが、検査や処置で変動します。\n正確な金額は診察後に確定します。`,

  docs_common: `書類の料金は、内容や保険会社の指定により異なります。\n作成には2〜3週間ほどお時間をいただいております。\n\n完成確認のお電話をしていただいてからご来院ください。\n医師は火曜・水曜・木曜のお昼休みに書類を作成しております。\nそのため即日発行はできません。`,
  docs_receive: `書類のお受け取りですね。\n本人確認をさせていただきます。\n\n個人情報を含むため、本人確認が取れない場合はお渡しできません。`,

  shindansho_a4: `当院発行の診断書（A4）ですね。\n料金は5,500円です。\n\n受け取り後の修正は、手数料がかかる場合があります。\n記載内容（氏名・日付・事故状況など）をお渡し前に一緒に確認させてください。`,

  seiho_no: `担当のケースワーカーへ、当院（まさき整形外科）へ受診する旨をお伝えください。\n市から当院へ電話確認が取れれば、生活保護（医療扶助）で受診可能です。\n\n電話確認が取れない場合は、生活保護（医療扶助）としては受付できません。\nただし、10割（自費扱い）であれば本日は受診できます。\n\n後日、手続きが整った場合の精算可否は市（保険者）の判断になりますので、ケースワーカーにご確認ください。\n10割で受診される場合は、当日のお支払いが必要になります。`,

  crutch_self: `医師の診察なしで松葉杖を終了される場合は、自己判断での返却となります。\nその後の転倒や症状悪化について、当院では責任を負いかねます。\n\n必要であれば、診察後に終了することも可能です。`,

  xp_rule: `レントゲン（XP）は診察が必要になります。\n先に診察受付へご案内します。`,

  sand_tip: `■ サンド：\n「物療（電気）」と「運動リハ」の間に診察を挟む\n\n■ 逆サンド：\n診察 → 物療（電気） → 運動リハ（または逆順）\n\n混雑時は「物療がある人は先に物療へ案内」できる場合があります。\n（※カルテの指示確認が前提）`,

  /* ✅ 骨塩 */
  bone_base: `骨密度（骨塩）検査ですね。\n検査部位でご案内が変わります。`,
  bone_forearm: `骨密度（前腕）は当日検査できます。\nこのまま骨塩へご案内します。`,
  bone_spine_hip: `骨密度（腰椎・大腿）は当日以降のご案内になります。\n検査日を確認してご案内します。\n（結果説明は診察で行います）`,
  bone_result: `骨塩の結果は、診察で医師からご説明します。\n本日は診察へご案内します。`,

  /* ✅ 採血 */
  blood_draw: `採血ですね。\nこのまま採血へご案内します。`,
  blood_result: `採血の結果は、診察で医師からご説明します。\n本日は診察へご案内します。`,

  /* ✅ MRI予約（サブ） */
  mri_reserve: `MRIの予約ですね。\n予約は別のiPadで取得します。\n\n手順：\n1) 希望の日付を伺う\n2) 日付を入力\n3) 患者情報＋予約日時を両面印刷して、お会計時にお渡し\n4) iPad と 電カルへ入力\n5) 診療情報提供書を印刷→スキャン\n\n※細かい詳細は「まさき」へ確認。`
};

const GLOBAL_DETAILS = [
  { label: "点数制（共通説明）", text: COMMON.money_common },
  { label: "10割いくら？（共通）", text: COMMON.tenwari_common },
  { label: "書類：作成ルール（2〜3週間）", text: COMMON.docs_common },
  { label: "書類：受取（本人確認）", text: COMMON.docs_receive },
  { label: "診断書A4：5,500円／修正手数料", text: COMMON.shindansho_a4 },
  { label: "骨塩：前腕=当日／腰椎大腿=当日以降", text: COMMON.bone_base + "\n\n・前腕：当日\n・腰椎・大腿：当日以降\n（結果は診察で説明）" },
  { label: "MRI予約（手順）", text: COMMON.mri_reserve },
  { label: "生保：医療扶助NGでも10割可", text: COMMON.seiho_no },
  { label: "XP（診察必須）", text: COMMON.xp_rule },
  { label: "サンド／逆サンド（混雑時）", text: COMMON.sand_tip },
  { label: "使い方（OS）", text:
`・青い枠＝患者さんに読むセリフ（大）
・ボタン＝分岐（迷わせない）
・チェック＝内部作業（忘れ防止）
・下の常駐バー＝割り込み（書類/金額/松葉/生保）`
  }
];

/* ===== Flow ===== */
const FLOW = {
  home: {
    title:"ホーム", badge:"入口",
    script:"案件を選択してください。",
    choices:[
      {label:"通常（保険）", next:"normal_entry", style:"primary"},
      {label:"労災（業務・通勤）", next:"rousai_1", style:"primary"},
      {label:"交通事故・第三者行為", next:"acc_entry", style:"primary"},
      {label:"待ち状況（外出案内）", next:"wait_1", style:"warn"},

      {label:"骨塩結果（結果は診察）", next:"bone_result_home", style:"primary"},
      {label:"採血結果（結果は診察）", next:"blood_result_home", style:"primary"},
      {label:"MRI予約（別iPad）", next:"mri_entry", style:"primary"},

      {label:"自費診療（白玉・美肌など）", next:"jihi_entry", style:"primary"},
      {label:"XP（レントゲン）", next:"xp_entry", style:"primary"},
      {label:"混雑時ヘルプ（サンド）", next:"sand_help", style:"warn"},
      {label:"書類（割り込み）", next:"docs_entry", style:"danger"},
      {label:"松葉杖（割り込み）", next:"crutch_entry", style:"primary"},
    ]
  },

  /* ===== ホーム常駐：結果系 ===== */
  bone_result_home:{ title:"骨塩結果", badge:"通常", script:COMMON.bone_result, choices:[
    {label:"（戻る）ホームへ", next:"home", style:""},
    {label:"通常（再診）へ", next:"normal_return", style:"primary"}
  ], actions:["結果説明は診察で行う旨を説明","診察へ案内"] },

  blood_result_home:{ title:"採血結果", badge:"通常", script:COMMON.blood_result, choices:[
    {label:"（戻る）ホームへ", next:"home", style:""},
    {label:"通常（再診）へ", next:"normal_return", style:"primary"}
  ], actions:["結果説明は診察で行う旨を説明","診察へ案内"] },

  /* ===== MRI予約 ===== */
  mri_entry:{ title:"MRI予約", badge:"通常", script:COMMON.mri_reserve, choices:[
    {label:"戻る", next:"home", style:""},
    {label:"ホームへ", next:"home", style:""}
  ], actions:[
    "希望日を確認",
    "別iPadで予約入力",
    "患者情報＋予約日時を両面印刷（会計時に渡す）",
    "iPadと電カルへ入力",
    "診療情報提供書を印刷→スキャン",
    "細かい詳細は「まさき」へ確認"
  ]},

  money_hub:{ title:"金額（ハブ）", badge:"共通", script:"どの説明が必要ですか？", choices:[
    {label:"金額について（点数制）", next:"money_common", style:"warn"},
    {label:"10割いくら？", next:"tenwari_money", style:"primary"},
    {label:"ホームへ", next:"home", style:""},
  ]},
  money_common:{ title:"金額について（共通）", badge:"共通", script:COMMON.money_common, choices:[
    {label:"戻る", next:"__BACK__", style:""}, {label:"ホームへ", next:"home", style:""}
  ]},
  tenwari_money:{ title:"10割いくら？", badge:"共通", script:COMMON.tenwari_common, choices:[
    {label:"戻る", next:"__BACK__", style:""}, {label:"ホームへ", next:"home", style:""}
  ]},

  xp_entry:{ title:"XP（レントゲン）", badge:"通常", script:COMMON.xp_rule, choices:[
    {label:"診察受付へ案内", next:"xp_to_exam", style:"primary"},
    {label:"ホームへ", next:"home", style:""},
  ], actions:["診察必須の説明を伝えた"]},
  xp_to_exam:{ title:"XP：案内", badge:"通常", script:"診察からのご案内になります。", choices:[
    {label:"戻る", next:"xp_entry", style:""}, {label:"ホームへ", next:"home", style:""}
  ]},

  sand_help:{ title:"混雑時ヘルプ（サンド）", badge:"待ち", script:"混雑時の案内はどれですか？", choices:[
    {label:"サンド／逆サンド（定義）", next:"sand_def", style:"warn"},
    {label:"物療がある人を先に案内したい", next:"sand_elec_first", style:"primary"},
    {label:"運動リハ予約が優先（20分間隔）", next:"sand_rehab_priority", style:"primary"},
    {label:"ホームへ", next:"home", style:""},
  ]},
  sand_def:{ title:"サンド／逆サンド", badge:"待ち", script:COMMON.sand_tip, choices:[
    {label:"戻る", next:"sand_help", style:""}, {label:"ホームへ", next:"home", style:""}
  ]},
  sand_elec_first:{ title:"混雑時：物療を先に案内", badge:"待ち",
    script:"診察が混んでいる場合、物療（電気）がある方は先に物療へご案内できることがあります。\n（カルテで指示が出ている方のみ）",
    choices:[{label:"戻る", next:"sand_help", style:""},{label:"ホームへ", next:"home", style:""}],
    actions:["カルテで物療の指示を確認"]
  },
  sand_rehab_priority:{ title:"運動リハ：予約優先", badge:"待ち",
    script:"運動器リハビリは予約が最優先です（20分間隔）。\n予約時間に合わせてご案内します。",
    choices:[{label:"戻る", next:"sand_help", style:""},{label:"ホームへ", next:"home", style:""}],
    actions:["予約枠（20分）を確認"]
  },

  wait_1:{ title:"待ち状況", badge:"待ち", script:"現在の待ち人数は？", choices:[
    {label:"0〜5人（空いてる）", next:"wait_0_5", style:"ok"},
    {label:"6〜10人（少しかかる）", next:"wait_6_10", style:"warn"},
    {label:"11人以上（混雑）", next:"wait_11p", style:"danger"},
    {label:"ホームへ", next:"home", style:""},
  ]},
  wait_0_5:{ title:"待ち状況（0〜5）", badge:"待ち",
    script:"現在は比較的空いております。\n診察内容により順番が前後する場合があります。",
    choices:[{label:"戻る", next:"wait_1", style:""},{label:"ホームへ", next:"home", style:""}]

/* ===== App state ===== */
const state = { current:"home", history:[], memos:{} };
const elScreen = document.getElementById("screen");
const elAside  = document.getElementById("aside");
const elChip   = document.getElementById("pathChip");

/* ===== Modal ===== */
function openModal(title, text){
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalText").textContent  = text;
  document.getElementById("modalBack").style.display = "flex";
}
function closeModal(){ document.getElementById("modalBack").style.display = "none"; }
document.getElementById("closeModal").addEventListener("click", closeModal);
document.getElementById("modalBack").addEventListener("click", (e)=>{ if(e.target.id==="modalBack") closeModal(); });

/* ===== Navigation ===== */
function setChip(text){ elChip.textContent = text; }
function go(nextId){
  if(nextId==="__BACK__"){ back(); return; }
  if(!FLOW[nextId]) return;
  state.history.push(state.current);
  state.current = nextId;
  render();
}
function jump(nextId){
  if(!FLOW[nextId]) return;
  state.history.push(state.current);
  state.current = nextId;
  render();
}
function back(){
  if(state.history.length===0){ state.current="home"; render(); return; }
  state.current = state.history.pop();
  render();
}

/* ===== Local save ===== */
function toggleCheck(key, val){ state.memos[key] = val ? "1" : ""; persist(); }
function persist(){ try{ localStorage.setItem("masaki_os_state_v034", JSON.stringify({memos:state.memos})); }catch{} }
function restore(){
  try{
    const raw = localStorage.getItem("masaki_os_state_v034");
    if(!raw) return;
    const obj = JSON.parse(raw);
    if(obj?.memos) state.memos = obj.memos;
  }catch{}
}
function resetSession(){ state.history=[]; state.memos={}; persist(); state.current="home"; render(); }

/* ===== Helpers ===== */
function escapeHtml(str){
  return String(str).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#039;");
}
function escapeJs(str){
  return String(str).replaceAll("\\","\\\\").replaceAll("'","\\'").replaceAll("\n","\\n").replaceAll("\r","");
}
function badgeClass(b){
  if(!b) return "";
  if(b==="労災") return "red";
  if(b==="待ち") return "amber";
  if(b==="自費") return "green";
  if(b==="通常") return "blue";
  if(b==="事故/第三者") return "red";
  if(b==="共通") return "amber";
  if(b==="書類") return "red";
  if(b==="松葉") return "blue";
  if(b==="生保") return "green";
  return "blue";
}

function setDockActive(){
  ["dockHome","dockDocs","dockMoney","dockCrutch","dockSeiho"].forEach(id=>document.getElementById(id).classList.remove("active"));
  const c = state.current;
  if(c==="home") document.getElementById("dockHome").classList.add("active");
  else if(c.startsWith("docs_")) document.getElementById("dockDocs").classList.add("active");
  else if(c.startsWith("money_") || c==="tenwari_money") document.getElementById("dockMoney").classList.add("active");
  else if(c.startsWith("crutch_")) document.getElementById("dockCrutch").classList.add("active");
  else if(c.startsWith("seiho_")) document.getElementById("dockSeiho").classList.add("active");
}

function renderAside(){
  const btns = GLOBAL_DETAILS.map(d =>
    `<button class="small" onclick="openModal('${escapeJs(d.label)}','${escapeJs(d.text)}')"
      ontouchstart="openModal('${escapeJs(d.label)}','${escapeJs(d.text)}')">${escapeHtml(d.label)}</button>`
  ).join("");

  elAside.innerHTML = `
    <div class="sectionTitle">詳細（右に常駐）</div>
    <div class="detailBtns">${btns}</div>
    <div class="sep"></div>
    <div class="sectionTitle">即答テンプレ（短文）</div>
    <div class="mini">■ 骨塩\n「前腕は当日。腰椎・大腿は当日以降。結果は診察で説明します。」\n\n■ 採血\n「結果は診察で説明します。」\n\n■ MRI\n「予約は別iPadで取ります。希望日を伺います。」\n\n■ 書類（労災/自賠責）\n「提出先・書式・期限の3点を確認します。」</div>
  `;
}

function render(){
  const s = FLOW[state.current];
  const chain = [s.badge || "OS", s.title].filter(Boolean).join(" / ");
  setChip(state.current==="home" ? "HOME" : chain);

  const parts = [];
  parts.push(`
    <div class="row" style="justify-content: space-between; align-items:flex-start; gap:10px;">
      <div>
        <div class="sectionTitle">${escapeHtml(s.title || "")}</div>
        ${s.badge ? `<span class="badge ${badgeClass(s.badge)}">${escapeHtml(s.badge)}</span>` : ""}
      </div>
      <div class="footerRow">
        <button class="small" onclick="back()" ontouchstart="back()">戻る</button>
      </div>
    </div>
  `);

  parts.push(`<div class="sep"></div>`);

  parts.push(`
    <details class="accordion" style="display:block; margin-bottom:10px;">
      <summary>詳細（ここをタップで開く）</summary>
      <div class="hint" style="margin-top:8px;">※PC/横幅があると右側に常時表示されます。</div>
      <div class="detailBtns">
        ${GLOBAL_DETAILS.map(d =>
          `<button class="small" onclick="openModal('${escapeJs(d.label)}','${escapeJs(d.text)}')"
            ontouchstart="openModal('${escapeJs(d.label)}','${escapeJs(d.text)}')">${escapeHtml(d.label)}</button>`
        ).join("")}
      </div>
    </details>
  `);

  parts.push(`<div class="script">${escapeHtml(s.script || "")}</div>`);
  if(s.hint) parts.push(`<div class="hint">${escapeHtml(s.hint)}</div>`);

  if(s.choices?.length){
    parts.push(`<div class="btnGrid">${
      s.choices.map(c =>
        `<button class="${(c.style||"").trim()}" onclick="go('${c.next}')" ontouchstart="go('${c.next}')">${escapeHtml(c.label)}</button>`
      ).join("")
    }</div>`);
  }

  if(s.actions?.length){
    parts.push(`<div class="sectionTitle">受付チェック（内部用）</div>`);
    parts.push(`<div class="actions">${
      s.actions.map((a, idx)=>{
        const key = `${state.current}__act__${idx}`;
        return `
          <label class="check">
            <input type="checkbox"
              onchange="toggleCheck('${key}', this.checked)"
              ${state.memos[key] ? "checked" : ""}/>
            <div>${escapeHtml(a)}</div>
          </label>
        `;
      }).join("")
    }</div>`);
  }

  parts.push(`<div class="sep"></div>`);
  parts.push(`
    <div class="footerRow">
      <button class="small grow" onclick="go('home')" ontouchstart="go('home')">ホーム</button>
      <button class="small grow" onclick="resetSession()" ontouchstart="resetSession()">セッション初期化</button>
    </div>
    <div class="hint">※「セッション初期化」：履歴・チェックを消して最初から。</div>
  `);

  elScreen.innerHTML = parts.join("");
  renderAside();
  setDockActive();
}

/* expose */
window.go = go;
window.jump = jump;
window.back = back;
window.openModal = openModal;
window.toggleCheck = toggleCheck;
window.resetSession = resetSession;

/* init */
restore();
render();
</script>
</body>
</html>
