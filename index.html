<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>まさき整形 受付対応OS v0.4.7</title>
  <style>
    :root{
      --bg:#0f172a;
      --panel:#111827;
      --panel2:#0b1220;
      --card:#1e293b;
      --cardHover:#334155;
      --border:#243244;
      --text:#f8fafc;
      --muted:#a7b0be;
      --blue:#38bdf8;
      --green:#34d399;
      --amber:#fbbf24;
      --red:#f87171;
      --radius:16px;
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Sans","Noto Sans JP",sans-serif;
      background:var(--bg);
      color:var(--text);
      overflow:hidden;
      -webkit-tap-highlight-color:transparent;
    }

    header{
      height:58px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 20px;
      background:var(--panel);
      border-bottom:1px solid var(--border);
      font-size:20px;
      font-weight:700;
      letter-spacing:.2px;
    }

    .header-right{
      display:flex;
      gap:10px;
      align-items:center;
    }

    .path-chip{
      font-size:12px;
      color:var(--muted);
      border:1px solid var(--border);
      border-radius:999px;
      padding:5px 10px;
      background:#0f172a;
      max-width:340px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .layout{
      display:flex;
      height:calc(100vh - 58px);
      min-height:0;
    }

    .menu{
      width:42%;
      min-width:420px;
      max-width:620px;
      padding:18px;
      background:var(--panel2);
      border-right:1px solid var(--border);
      overflow:auto;
      overscroll-behavior:contain;
      touch-action:pan-y;
    }

    .menu-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      align-content:start;
    }

    .detail{
      width:58%;
      min-width:0;
      padding:24px;
      background:var(--panel);
      overflow:auto;
      overscroll-behavior:contain;
      touch-action:pan-y;
    }

    .tap-btn{
      border:none;
      border-radius:var(--radius);
      background:var(--card);
      color:var(--text);
      padding:18px 16px;
      font-size:18px;
      font-weight:700;
      text-align:left;
      cursor:pointer;
      transition:background .18s ease, transform .04s ease;
      user-select:none;
      touch-action:manipulation;
      box-shadow:0 0 0 1px rgba(255,255,255,.03) inset;
    }

    .tap-btn:active{
      transform:scale(.992);
    }

    .tap-btn:hover{
      background:var(--cardHover);
    }

    .tap-btn.primary{ box-shadow:0 0 0 1px rgba(56,189,248,.32) inset; }
    .tap-btn.warn{ box-shadow:0 0 0 1px rgba(251,191,36,.35) inset; }
    .tap-btn.ok{ box-shadow:0 0 0 1px rgba(52,211,153,.35) inset; }
    .tap-btn.danger{ box-shadow:0 0 0 1px rgba(248,113,113,.35) inset; }

    .section-label{
      font-size:13px;
      color:var(--muted);
      margin-bottom:12px;
      font-weight:700;
      letter-spacing:.3px;
    }

    .title-row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
      margin-bottom:16px;
    }

    .title-wrap{
      min-width:0;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      padding:5px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      font-size:12px;
      font-weight:800;
      color:var(--muted);
      margin-bottom:10px;
      background:#0f172a;
    }
    .badge.blue{ color:#bfdbfe; border-color:rgba(56,189,248,.35); }
    .badge.green{ color:#a7f3d0; border-color:rgba(52,211,153,.35); }
    .badge.amber{ color:#fde68a; border-color:rgba(251,191,36,.35); }
    .badge.red{ color:#fecaca; border-color:rgba(248,113,113,.35); }

    .detail h2{
      margin:0;
      font-size:26px;
      color:var(--blue);
      line-height:1.25;
      letter-spacing:.2px;
    }

    .script{
      background:#0f172a;
      border:1px solid var(--border);
      border-radius:18px;
      padding:18px;
      font-size:22px;
      line-height:1.65;
      font-weight:700;
      white-space:pre-line;
      margin-bottom:18px;
    }

    .hint{
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
      margin:-4px 0 18px;
      white-space:pre-line;
    }

    .sub-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-bottom:18px;
    }

    .control-row{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .small-btn{
      padding:12px 14px;
      font-size:15px;
      min-width:120px;
    }

    .checks{
      display:grid;
      gap:10px;
      margin-bottom:18px;
    }

    .check-item{
      display:flex;
      gap:10px;
      align-items:flex-start;
      background:#0f172a;
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px 14px;
      font-size:16px;
      line-height:1.5;
      font-weight:600;
    }

    .check-item input{
      width:20px;
      height:20px;
      margin-top:2px;
      flex:0 0 auto;
    }

    .detail-box{
      background:#0f172a;
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px 16px;
      font-size:15px;
      line-height:1.7;
      white-space:pre-line;
      margin-bottom:18px;
    }

    .flow-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-bottom:18px;
    }

    .flow-card{
      background:#0f172a;
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px;
      min-height:118px;
      position:relative;
    }

    .flow-card::after{
      content:"→";
      position:absolute;
      right:12px;
      bottom:8px;
      color:var(--muted);
      font-size:18px;
      font-weight:900;
    }

    .flow-card:last-child::after{
      content:"完";
      font-size:13px;
      bottom:11px;
    }

    .flow-num{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:28px;
      height:28px;
      border-radius:999px;
      background:rgba(56,189,248,.14);
      border:1px solid rgba(56,189,248,.35);
      color:#bfdbfe;
      font-size:13px;
      font-weight:900;
      margin-bottom:8px;
    }

    .flow-title{
      font-size:16px;
      font-weight:900;
      line-height:1.35;
      margin-bottom:7px;
    }

    .flow-body{
      color:var(--muted);
      font-size:14px;
      line-height:1.55;
      white-space:pre-line;
      padding-right:18px;
    }

    .home-note{
      font-size:15px;
      color:var(--muted);
      line-height:1.7;
      white-space:pre-line;
    }

    @media (max-width: 1100px){
      .menu{ min-width:360px; width:44%; }
      .detail{ width:56%; }
      .script{ font-size:20px; }
      .detail h2{ font-size:24px; }
      .flow-grid{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

    <div>まさき整形 受付対応OS v0.4.7</div>

      <div class="menu-grid" id="menuGrid"></div>

  </div>

        detail: "足・手・肘：\n・アーチサポーター 縦：2,640円 / 横：2,420円\n・エクスエイドリスト（S〜L）：3,850円\n・エルボーバンド：1,300円\n・エラスティックラップ / 手首用：800円\n・サムラップ：2,530円\n・ニーラップ：2,600円\n・ニーラップライト：3,080円\n・テーピングテープ（足首用）：300円\n\nサポーター：\n・ガードラーOSバンド：2,480円\n・ソフラウルファ（M〜LX）：1,540円\n・D&Mサポーター 膝：1,000円 / 肘：800円",
        checks: ["リハ室扱いか確認", "サイズ・左右を確認", "患者さんへ自費物品であることを説明"],
        backTo: "jihi"
      },
      jihi_braces: {
        badge: "自費",
        badgeClass: "amber",
        title: "保険適用外 装具",
        script: "保険適用外の装具・固定具です。\nサイズ違いで金額が大きく変わるため、実物確認が必要です。",
        detail: "装具：\n・カラーキーパーU（S〜M）：1,870円\n・クラビクルバンドII SS：2,420円 / S：3,025円 / M：4,235円 / L・LL：4,840円\n・ハイブリッド アンクル（S〜L）：7,480円\n・ハイブリッド ニー 伸縮タイプ（S〜LL）：10,450円\n・ハイブリッド リスト ショート（S〜L）：5,280円\n・ハイブリッド リスト ロング：6,490円\n・マックスベルト（SS〜5L）：1,870円\n\nリブバンド：\n・S：1,540円 / M：1,650円 / L：1,760円 / LL：1,870円 / 3L：1,980円\n・女性用 M：1,540円 / L：1,700円 / LL：1,760円\n\n関連点数メモ：\n・頸部固定帯加算：170点\n・鎖骨骨折固定術：500点\n・ギプス包帯 / シーネ固定：490 / 780 / 1,200点\n・腰部固定帯加算：170点\n・胸部固定帯加算：170点\n・肋骨骨折固定術（+テーピング）：500点",
        checks: ["保険適用外であることを説明", "サイズを確認", "関連点数算定が必要か確認", "患者さんへ金額を説明"],
        backTo: "jihi"
      },
      sand: { badge: "待ち", badgeClass: "amber", title: "サンド / 逆サンド", script: "混雑時の案内はどれですか？", buttons: [{ id:"sand_def", label:"サンド / 逆サンド（定義）", style:"warn" }, { id:"sand_elec", label:"物療がある人を先に案内したい", style:"primary" }, { id:"sand_rehab", label:"運動リハ予約が優先", style:"primary" }] },
      sand_def: { badge: "待ち", badgeClass: "amber", title: "サンド / 逆サンド", script: "■ サンド：\n「物療（電気）」と「運動リハ」の間に診察を挟む\n\n■ 逆サンド：\n診察 → 物療（電気） → 運動リハ（または逆順）", detail: "混雑時は「物療がある人は先に物療へ案内」できる場合があります。\n※カルテの指示確認が前提", backTo: "sand" },
      sand_elec: { badge: "待ち", badgeClass: "amber", title: "混雑時：物療を先に案内", script: "診察が混んでいる場合、物療（電気）がある方は先に物療へご案内できることがあります。", detail: "※カルテで指示が出ている方のみ", checks: ["カルテで物療の指示を確認"], backTo: "sand" },
      sand_rehab: { badge: "待ち", badgeClass: "amber", title: "運動リハ：予約優先", script: "運動器リハビリは予約が最優先です（20分間隔）。\n予約時間に合わせてご案内します。", checks: ["予約枠（20分）を確認"], backTo: "sand" }
    };

    const CHECK_STORE_KEY = "masaki_os_v037_checks";
    let currentScreen = "home";
    let checks = {};

    function loadChecks(){
      try{
        const raw = localStorage.getItem(CHECK_STORE_KEY);
        if(raw){ checks = JSON.parse(raw) || {}; }
      }catch(e){ checks = {}; }
    }
    function saveChecks(){ localStorage.setItem(CHECK_STORE_KEY, JSON.stringify(checks)); }
    function getCheckKey(screenId, idx){ return screenId + "__" + idx; }

    function renderMenu(){
      const grid = document.getElementById("menuGrid");
      grid.innerHTML = "";
      MENU.forEach(function(item){
        const btn = document.createElement("button");
        btn.className = "tap-btn " + (item.style || "");
        btn.textContent = item.label;
        btn.setAttribute("data-target", item.id);
        grid.appendChild(btn);
      });
    }

    function renderScreen(screenId){
      currentScreen = screenId;
      const s = SCREENS[screenId];
      const detail = document.getElementById("detailArea");
      const pathChip = document.getElementById("pathChip");
      pathChip.textContent = screenId.toUpperCase();

      let html = "";
      html += '<div class="title-row">';
      html +=   '<div class="title-wrap">';
      html +=     '<div class="badge ' + (s.badgeClass || "blue") + '">' + escapeHtml(s.badge || "") + '</div>';
      html +=     '<h2>' + escapeHtml(s.title || "") + '</h2>';
      html +=   '</div>';
      html +=   '<div class="control-row">';
      if(s.backTo){ html += '<button class="tap-btn small-btn" data-target="' + s.backTo + '">戻る</button>'; }
      html +=   '<button class="tap-btn small-btn" data-target="home">ホーム</button>';
      html +=   '</div>';
      html += '</div>';

      html += '<div class="script">' + escapeHtml(s.script || "") + '</div>';
      if(s.hint){ html += '<div class="hint">' + escapeHtml(s.hint) + '</div>'; }

      if(s.buttons && s.buttons.length){
        html += '<div class="sub-grid">';
        s.buttons.forEach(function(b){
          html += '<button class="tap-btn ' + (b.style || "") + '" data-target="' + b.id + '">' + escapeHtml(b.label) + '</button>';
        });
        html += '</div>';
      }

      if(s.flow && s.flow.length){
        html += '<div class="section-label">図解フロー</div>';
        html += '<div class="flow-grid">';
        s.flow.forEach(function(step, idx){
          html += '<div class="flow-card">';
          html +=   '<div class="flow-num">' + (idx + 1) + '</div>';
          html +=   '<div class="flow-title">' + escapeHtml(step.title || "") + '</div>';
          html +=   '<div class="flow-body">' + escapeHtml(step.body || "") + '</div>';
          html += '</div>';
        });
        html += '</div>';
      }

      if(s.checks && s.checks.length){
        html += '<div class="section-label">内部チェック</div>';
        html += '<div class="checks">';
        s.checks.forEach(function(text, idx){
          const key = getCheckKey(screenId, idx);
          const checked = checks[key] ? "checked" : "";
          html += '<label class="check-item">';
          html +=   '<input type="checkbox" data-check-key="' + key + '" ' + checked + '>';
          html +=   '<span>' + escapeHtml(text) + '</span>';
          html += '</label>';
        });
        html += '</div>';
      }

      if(s.detail){
        html += '<div class="section-label">詳細</div>';
        html += '<div class="detail-box">' + escapeHtml(s.detail) + '</div>';
      }

      detail.innerHTML = html;
      bindCheckEvents();
    }

    function bindCheckEvents(){
      document.querySelectorAll('[data-check-key]').forEach(function(el){
        el.addEventListener('change', function(){
          const key = el.getAttribute('data-check-key');
          checks[key] = el.checked ? 1 : 0;
          saveChecks();
        });
      });
    }

    function escapeHtml(str){
      return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    let tapState = null;
    const MOVE_LIMIT = 14;
    const TIME_LIMIT = 500;

    document.addEventListener("pointerdown", function(e){
      const btn = e.target.closest(".tap-btn");
      if(!btn) return;
      tapState = { btn: btn, x: e.clientX, y: e.clientY, time: Date.now(), moved: false, pointerId: e.pointerId };
    }, true);

    document.addEventListener("pointermove", function(e){
      if(!tapState || e.pointerId !== tapState.pointerId) return;
      if(Math.abs(e.clientX - tapState.x) > MOVE_LIMIT || Math.abs(e.clientY - tapState.y) > MOVE_LIMIT){ tapState.moved = true; }
    }, true);

    document.addEventListener("pointerup", function(e){
      if(!tapState || e.pointerId !== tapState.pointerId) return;
      const btn = e.target.closest(".tap-btn");
      if(btn && btn === tapState.btn && !tapState.moved && (Date.now() - tapState.time) <= TIME_LIMIT){
        const target = tapState.btn.getAttribute("data-target");
        if(target && SCREENS[target]){ renderScreen(target); }
      }
      tapState = null;
    }, true);

    document.addEventListener("click", function(e){
      if(e.target.closest(".tap-btn")){ e.preventDefault(); e.stopPropagation(); }
    }, true);

    loadChecks();
    renderMenu();
    renderScreen("home");
  </script>
</body>
</html>
